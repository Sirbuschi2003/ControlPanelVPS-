name: Build & Release

on:
  push:
    branches: [master]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build master binary
        working-directory: master
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -mod=mod \
            -ldflags="-w -s \
              -X 'github.com/Sirbuschi2003/ControlPanelVPS/master/internal/version.Commit=${{ github.sha }}' \
              -X 'github.com/Sirbuschi2003/ControlPanelVPS/master/internal/version.Date=${BUILD_DATE}'" \
            -o ../dist/master ./cmd/server

      - name: Build agent binary
        working-directory: agent
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -mod=mod \
            -ldflags="-w -s \
              -X 'github.com/Sirbuschi2003/ControlPanelVPS/agent/internal/version.Commit=${{ github.sha }}' \
              -X 'github.com/Sirbuschi2003/ControlPanelVPS/agent/internal/version.Date=${BUILD_DATE}'" \
            -o ../dist/agent ./cmd/agent

      - name: Install frontend deps
        working-directory: frontend
        run: npm install --no-fund --no-audit

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ""
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Package frontend
        run: |
          [ -d frontend/public ] && cp -r frontend/public frontend/.next/standalone/ || true
          cp -r frontend/.next/static frontend/.next/standalone/.next/
          tar -czf dist/frontend.tar.gz -C frontend/.next/standalone .

      - name: Create latest release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Latest Build"
          artifacts: "dist/master,dist/agent,dist/frontend.tar.gz"
          allowUpdates: true
          removeArtifacts: true
          prerelease: true
          body: |
            Automatisch gebaut von GitHub Actions.
            commit: ${{ github.sha }}
            built: ${{ github.event.head_commit.timestamp }}
